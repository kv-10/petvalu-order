<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pet Valu Order</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #060910;
  --s1:      #0c1018;
  --s2:      #131824;
  --s3:      #1a2233;
  --border:  #1e2636;
  --border2: #28374f;
  --accent:  #00c896;
  --accent2: #00a67d;
  --accentd: rgba(0,200,150,0.12);
  --blue:    #4d9fff;
  --blued:   rgba(77,159,255,0.12);
  --red:     #ff5e7a;
  --redd:    rgba(255,94,122,0.1);
  --text:    #e4ecf7;
  --text2:   #8fa8c8;
  --muted:   #3d5068;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Figtree', sans-serif; color: var(--text); height: 100dvh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

.screen { display: none; flex-direction: column; height: 100dvh; overflow: hidden; position: absolute; inset: 0; }
.screen.active { display: flex; }

/* ── STORE SELECT ── */
#s-store { justify-content: center; padding: 0 28px; background: var(--bg); }
.brand-line { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
.store-heading { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--text); line-height: 1.05; margin-bottom: 44px; }
.store-list { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.store-btn { width: 100%; padding: 17px 20px; background: var(--s1); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-family: 'Figtree', sans-serif; position: relative; overflow: hidden; }
.store-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); transform: scaleY(0); transition: transform 0.15s; border-radius: 0 2px 2px 0; }
.store-btn:active { background: var(--s2); border-color: var(--accent); }
.store-btn:active::before { transform: scaleY(1); }
.store-btn-name { font-size: 16px; font-weight: 700; color: var(--text); }
.store-btn-arr { font-size: 16px; color: var(--muted); font-weight: 700; }
.hist-link { width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 12px; padding: 13px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; }
.hist-link:active { border-color: var(--border2); color: var(--text); }

/* ── TOPBAR ── */
.topbar { padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
.back-btn {
  height: 36px; padding: 0 14px;
  background: var(--accent); border: none;
  border-radius: 10px; cursor: pointer; color: #000;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; font-family: 'Figtree', sans-serif;
  font-size: 13px; font-weight: 800;
}
.back-btn:active { background: var(--accent2); }
.back-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.topbar-center { flex: 1; }
.topbar-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2; }
.topbar-date { font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 1px; }
.topbar-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); text-align: center; }

/* ── ENTRY ITEMS LIST ── */
.items-area { flex: 1; overflow-y: auto; padding: 8px 16px 4px; }
.items-list-hdr { display: grid; grid-template-columns: 1fr 60px 60px 36px; padding: 6px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 2px; gap: 6px; }
.items-list-hdr div:nth-child(2), .items-list-hdr div:nth-child(3) { text-align: center; }
.item-row { display: grid; grid-template-columns: 1fr 60px 60px 36px; align-items: center; gap: 6px; padding: 2px 0; }
.item-cell { padding: 9px 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; min-height: 38px; display: flex; align-items: center; transition: background 0.1s; }
.item-cell:active { background: var(--s3); }
.item-cell.editing { background: var(--s2); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accentd); }
.item-cell.editing-blue { background: var(--s2); border-color: var(--blue); box-shadow: 0 0 0 2px var(--blued); }
.ic-num  { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
.ic-qty  { justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); }
.ic-qoh  { justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--blue); }
.del-btn { width: 32px; height: 32px; background: none; border: none; cursor: pointer; color: var(--muted); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.del-btn:active { background: var(--redd); color: var(--red); }
.del-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; }
.no-items-msg { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 13px; font-weight: 500; }

/* ── ENTRY DISPLAY (step + value) ── */
#entry-display { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
.step-track { display: flex; gap: 6px; margin-bottom: 36px; }
.step-seg { height: 3px; border-radius: 99px; background: var(--s3); flex: 1; transition: background 0.25s; }
.step-seg.active, .step-seg.done { background: var(--accent); }
.e-field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
.e-field-label.blue-lbl  { color: var(--blue); }
.e-field-label.edit-lbl  { color: var(--text2); }
.e-value { font-family: 'JetBrains Mono', monospace; font-size: 52px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 10px; min-height: 64px; display: flex; align-items: center; word-break: break-all; }
.e-value.dim { color: var(--s3); font-family: 'Figtree', sans-serif; font-size: 22px; font-weight: 600; }
.e-cursor { display: inline-block; width: 3px; height: 44px; background: var(--accent); margin-left: 4px; vertical-align: middle; border-radius: 2px; animation: blink 1s step-end infinite; }
.e-cursor.blue-cur { background: var(--blue); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
.e-context { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
.e-ctx-chip { font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.e-ctx-chip .cv { color: var(--text2); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.e-ctx-chip .ca { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ── NUMPAD ── */
.numpad { flex-shrink: 0; background: var(--s1); border-top: 1px solid var(--border); padding: 10px 14px 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }
.k { background: var(--s2); border: 1px solid var(--border); border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); cursor: pointer; padding: 14px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; line-height: 1; user-select: none; transition: transform 0.07s; }
.k:active { transform: scale(0.91); background: var(--s3); }
.k.util { background: var(--bg); color: var(--text2); font-size: 13px; font-family: 'Figtree', sans-serif; font-weight: 700; border-color: var(--border); }
.k.util:active { background: var(--s2); }
.k.kaccent { background: var(--accent); color: #000; font-size: 13px; font-family: 'Figtree', sans-serif; font-weight: 800; border-color: var(--accent); }
.k.kaccent:active { background: var(--accent2); transform: scale(0.93); }
.k.kblue { background: var(--blue); color: #000; font-size: 13px; font-family: 'Figtree', sans-serif; font-weight: 800; border-color: var(--blue); }
.k.kblue:active { opacity: 0.85; transform: scale(0.93); }
.k-sub { font-size: 9px; font-weight: 700; letter-spacing: 0.6px; opacity: 0.65; font-family: 'Figtree', sans-serif; }
.k-review { grid-column: span 4; margin-top: 2px; width: 100%; padding: 15px; border-radius: 13px; border: none; font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; background: var(--s2); color: var(--muted); transition: background 0.2s, color 0.2s; }
.k-review.on { background: var(--accent); color: #000; }
.k-review:active { opacity: 0.88; }

/* ── REVIEW SCREEN ── */
#s-review { background: var(--bg); }
.rev-scroll { flex: 1; overflow-y: auto; padding: 0 18px 12px; }
.info-card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin: 14px 0 12px; }
.ic-store { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
.ic-meta  { font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 3px; }
.ic-badge { background: var(--accentd); border: 1px solid var(--accent); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; color: var(--accent); }
.rev-hint { font-size: 11px; font-weight: 600; color: var(--muted); text-align: center; margin-bottom: 10px; letter-spacing: 0.3px; }

/* Review table with editable cells */
.rev-t-head { display: grid; grid-template-columns: 1fr 72px 72px 36px; padding: 8px 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 2px; gap: 4px; }
.rev-t-head div:nth-child(2), .rev-t-head div:nth-child(3) { text-align: center; }
.rev-t-row { display: grid; grid-template-columns: 1fr 72px 72px 36px; align-items: center; gap: 4px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.rev-t-row:last-child { border-bottom: none; }
.rev-cell { padding: 10px 8px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; min-height: 40px; display: flex; align-items: center; transition: background 0.1s; }
.rev-cell:active { background: var(--s3); }
.rev-cell.editing { background: var(--s2); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accentd); }
.rev-cell.editing-blue { background: var(--s2); border-color: var(--blue); box-shadow: 0 0 0 2px var(--blued); }
.rc-num   { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
.rc-order { justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); }
.rc-qoh   { justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--blue); }
.rc-del   { width: 32px; height: 32px; background: none; border: none; cursor: pointer; color: var(--muted); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rc-del:active { background: var(--redd); color: var(--red); }
.rc-del svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; }

/* Slide-up numpad overlay (for review screen) */
.numpad-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.5);
  display: none; flex-direction: column; justify-content: flex-end;
}
.numpad-overlay.show { display: flex; }
.numpad-sheet {
  background: var(--s1); border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 0 14px 20px;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
.numpad-overlay.show .numpad-sheet { transform: translateY(0); }
.numpad-sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 10px auto 12px; }
.numpad-edit-header { padding: 0 4px 12px; display: flex; align-items: center; justify-content: space-between; }
.neh-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); }
.neh-val { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--text); display: flex; align-items: center; }
.neh-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 700; color: var(--text2); cursor: pointer; }
.neh-cancel:active { background: var(--s3); }
.overlay-numpad { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }

/* Review actions */
.rev-actions { padding: 10px 18px 24px; display: flex; flex-direction: column; gap: 9px; flex-shrink: 0; border-top: 1px solid var(--border); }
.btn-primary   { padding: 16px; border-radius: 13px; border: none; font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; background: var(--accent); color: #000; }
.btn-primary:active { opacity: 0.88; }
.btn-secondary { padding: 14px; border-radius: 13px; border: 1px solid var(--border); font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; background: var(--s1); color: var(--text2); }
.btn-secondary:active { background: var(--s2); }
.btn-ghost     { padding: 13px; border-radius: 13px; border: none; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted); }

/* ── HISTORY ── */
.hist-scroll { flex: 1; overflow-y: auto; padding: 14px 20px; }
.h-group { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.h-group:first-child { margin-top: 0; }
.h-card { background: var(--s1); border: 1px solid var(--border); border-radius: 13px; padding: 13px 15px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.h-card:active { background: var(--s2); border-color: var(--border2); }
.hc-date { font-size: 14px; font-weight: 700; color: var(--text); }
.hc-meta { font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 2px; }
.hc-right { display: flex; align-items: center; gap: 10px; }
.hc-cnt  { font-size: 12px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.hc-arr  { color: var(--muted); font-size: 16px; font-weight: 700; }
.hc-del  { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 5px 7px; border-radius: 7px; font-family: 'Figtree', sans-serif; }
.hc-del:active { background: var(--redd); color: var(--red); }
.empty { text-align: center; padding: 52px 0; color: var(--muted); }
.empty p { font-size: 14px; font-weight: 600; line-height: 1.5; margin-top: 10px; }

/* ── PAST ORDER ── */
.scroll-area { flex: 1; overflow-y: auto; padding: 0 20px; }
.t-head { display: grid; grid-template-columns: 1fr 64px 64px; padding: 8px 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 2px; }
.t-head div:nth-child(2), .t-head div:nth-child(3) { text-align: center; }
.t-row { display: grid; grid-template-columns: 1fr 64px 64px; padding: 12px 6px; border-bottom: 1px solid var(--border); align-items: center; }
.t-row:last-child { border-bottom: none; }
.t-item  { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
.t-order { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); }
.t-qoh   { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--blue); }
.past-actions { padding: 14px 20px 28px; display: flex; flex-direction: column; gap: 9px; flex-shrink: 0; }

/* ── TOAST ── */
#toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--s3); border: 1px solid var(--border2); color: var(--text); padding: 11px 22px; border-radius: 99px; font-weight: 700; font-size: 13px; white-space: nowrap; z-index: 999; opacity: 0; transition: all 0.22s; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ STORE SELECT ══ -->
<div id="s-store" class="screen active">
  <div class="brand-line">Pet Valu</div>
  <div class="store-heading">Which store<br>today?</div>
  <div class="store-list">
    <button class="store-btn" onclick="selectStore('Lakeshore Rd')"><span class="store-btn-name">Lakeshore Rd</span><span class="store-btn-arr">›</span></button>
    <button class="store-btn" onclick="selectStore('Lambton Mall')"><span class="store-btn-name">Lambton Mall</span><span class="store-btn-arr">›</span></button>
    <button class="store-btn" onclick="selectStore('Corunna')"><span class="store-btn-name">Corunna</span><span class="store-btn-arr">›</span></button>
    <button class="store-btn" onclick="selectStore('London')"><span class="store-btn-name">London</span><span class="store-btn-arr">›</span></button>
  </div>
  <button class="hist-link" onclick="goTo('s-history'); renderHist()">Past Orders</button>
</div>

<!-- ══ ENTRY ══ -->
<div id="s-entry" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('s-store')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="topbar-center">
      <div class="topbar-name" id="tStore"></div>
      <div class="topbar-date" id="tDate"></div>
    </div>
    <div style="width:10px"></div>
  </div>

  <!-- Items always visible -->
  <div class="items-area" id="itemsArea">
    <div class="items-list-hdr"><div>Item #</div><div>Order</div><div>On Hand</div><div></div></div>
    <div id="items-inner"></div>
  </div>

  <!-- Divider -->
  <div style="height:1px;background:var(--border);flex-shrink:0"></div>

  <!-- Entry display (only shown when not editing) -->
  <div id="entry-display">
    <div class="step-track">
      <div class="step-seg active" id="seg0"></div>
      <div class="step-seg" id="seg1"></div>
      <div class="step-seg" id="seg2"></div>
    </div>
    <div class="e-field-label" id="eLabel">Item Number</div>
    <div class="e-value dim" id="eVal">enter item #<span class="e-cursor" id="eCursor"></span></div>
    <div class="e-context" id="eCtx"></div>
  </div>

  <div class="numpad">
    <div></div>
    <button class="k" onclick="kp('1')">1</button>
    <button class="k" onclick="kp('2')">2</button>
    <button class="k" onclick="kp('3')">3</button>
    <button class="k util" onclick="kpBack()">
      <svg style="width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="k-sub">Back</span>
    </button>
    <button class="k" onclick="kp('4')">4</button>
    <button class="k" onclick="kp('5')">5</button>
    <button class="k" onclick="kp('6')">6</button>
    <button class="k util" onclick="kpDel()">
      <svg style="width:18px;height:18px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
    </button>
    <button class="k" onclick="kp('7')">7</button>
    <button class="k" onclick="kp('8')">8</button>
    <button class="k" onclick="kp('9')">9</button>
    <button class="k kaccent" id="nextBtn" onclick="kpNext()">Next</button>
    <div></div>
    <button class="k" onclick="kp('0')">0</button>
    <div></div>
    <button class="k-review" id="reviewBtn" onclick="goToReview()">Review Order</button>
  </div>
</div>

<!-- ══ REVIEW ══ -->
<div id="s-review" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('s-entry')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="topbar-center" style="text-align:center">
      <div class="topbar-title">Review Order</div>
    </div>
    <div style="width:10px"></div>
  </div>

  <div class="rev-scroll">
    <div class="info-card">
      <div><div class="ic-store" id="rStore"></div><div class="ic-meta" id="rMeta"></div></div>
      <div class="ic-badge" id="rBadge"></div>
    </div>
    <div class="rev-hint">Tap any cell to edit</div>
    <div class="rev-t-head"><div>Item #</div><div>Order</div><div>On Hand</div><div></div></div>
    <div id="rList"></div>
  </div>

  <div class="rev-actions">
    <button class="btn-primary" onclick="finalise()">Save &amp; Copy for Computer</button>
    <button class="btn-secondary" onclick="dlCSV()">Save as Spreadsheet</button>
    <button class="btn-ghost" onclick="goTo('s-entry')">Continue Adding Items</button>
  </div>
</div>

<!-- ══ HISTORY ══ -->
<div id="s-history" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('s-store')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="topbar-center" style="text-align:center">
      <div class="topbar-title">Past Orders</div>
    </div>
    <div style="width:10px"></div>
  </div>
  <div class="hist-scroll" id="hScroll"></div>
</div>

<!-- ══ PAST ORDER ══ -->
<div id="s-past" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('s-history')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="topbar-center" style="text-align:center">
      <div class="topbar-title" id="pTitle"></div>
    </div>
    <div style="width:10px"></div>
  </div>
  <div class="scroll-area">
    <div class="info-card" style="margin-top:14px">
      <div><div class="ic-store" id="pStore"></div><div class="ic-meta" id="pMeta"></div></div>
    </div>
    <div class="t-head"><div>Item #</div><div>Order</div><div>On Hand</div></div>
    <div id="pList"></div>
  </div>
  <div class="past-actions">
    <button class="btn-primary" onclick="copyPast()">Copy for Computer</button>
    <button class="btn-secondary" onclick="dlPastCSV()">Save as Spreadsheet</button>
  </div>
</div>

<!-- ══ SLIDE-UP NUMPAD OVERLAY (review screen editing) ══ -->
<div class="numpad-overlay" id="numpadOverlay" onclick="overlayBgClick(event)">
  <div class="numpad-sheet" id="numpadSheet">
    <div class="numpad-sheet-handle"></div>
    <div class="numpad-edit-header">
      <div>
        <div class="neh-label" id="overlayLabel">Order Qty</div>
        <div class="neh-val" id="overlayVal">–<span class="e-cursor" id="overlayCursor"></span></div>
      </div>
      <button class="neh-cancel" onclick="closeOverlay()">Cancel</button>
    </div>
    <div class="overlay-numpad">
      <div></div>
      <button class="k" onclick="okp('1')">1</button>
      <button class="k" onclick="okp('2')">2</button>
      <button class="k" onclick="okp('3')">3</button>
      <div></div>
      <button class="k" onclick="okp('4')">4</button>
      <button class="k" onclick="okp('5')">5</button>
      <button class="k" onclick="okp('6')">6</button>
      <button class="k util" onclick="okpDel()">
        <svg style="width:18px;height:18px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
      <button class="k" onclick="okp('7')">7</button>
      <button class="k" onclick="okp('8')">8</button>
      <button class="k" onclick="okp('9')">9</button>
      <button class="k kaccent" id="overlaySaveBtn" onclick="saveOverlayEdit()">Save</button>
      <div></div>
      <button class="k" onclick="okp('0')">0</button>
      <div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const FIELDS  = ['item','order','qoh'];
const LABELS  = { item:'Item Number', order:'Order Qty', qoh:'On Hand' };
const PROMPTS = { item:'enter item #', order:'enter qty', qoh:'on hand' };
const HK = 'pv_hist_v4', DP = 'pv_draft_v4_';

let store = '', items = [], curField = 'item', curValue = '', curRow = {item:'',order:'',qoh:''};
let pastOrder = null, nextId = 1;

// Inline edit state (entry screen)
let editIdx = -1, editField = null;

// Overlay edit state (review screen)
let overlayIdx = -1, overlayField = null, overlayValue = '';

// ── STORAGE ──
const loadHist  = () => { try{return JSON.parse(localStorage.getItem(HK)||'[]')}catch{return[]} };
const saveHist  = h  => { try{localStorage.setItem(HK,JSON.stringify(h))}catch{} };
const loadDraft = s  => { try{return JSON.parse(localStorage.getItem(DP+s)||'[]')}catch{return[]} };
const saveDraft = () => { try{localStorage.setItem(DP+store,JSON.stringify(items))}catch{} };
const clearDraft= () => { try{localStorage.removeItem(DP+store)}catch{} };
function archiveOrder() {
  const h = loadHist();
  h.unshift({ id:Date.now(), store, date:new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}), isoDate:new Date().toLocaleDateString('en-CA'), items:items.filter(i=>i.order>0) });
  saveHist(h.slice(0,50));
}

// ── NAVIGATION ──
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── STORE SELECT ──
function selectStore(name) {
  store = name;
  const draft = loadDraft(name);
  nextId = 1;
  items = draft.map(i => ({...i, id: nextId++}));
  curField='item'; curValue=''; curRow={item:'',order:'',qoh:''};
  editIdx=-1; editField=null;
  document.getElementById('tStore').textContent = name;
  document.getElementById('tDate').textContent  = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  renderEntryItems(); refreshDisp(); refreshNext(); refreshReview();
  goTo('s-entry');
}

// ── ENTRY KEYPAD ──
function kp(d)    { curValue += d; editIdx >= 0 ? refreshEditDisp() : refreshDisp(); }
function kpDel()  { curValue = curValue.slice(0,-1); editIdx >= 0 ? refreshEditDisp() : refreshDisp(); }
function kpBack() {
  if (editIdx >= 0) return;
  curRow[curField] = curValue;
  const idx = FIELDS.indexOf(curField); if (idx === 0) return;
  curField = FIELDS[idx-1]; curValue = curRow[curField] || '';
  refreshDisp(); refreshNext();
}
function kpNext() {
  if (editIdx >= 0) { saveInlineEdit(); return; }
  if (!curValue && curField === 'item') { showToast('Enter an item number first'); return; }
  curRow[curField] = curValue;
  const idx = FIELDS.indexOf(curField);
  if (idx < FIELDS.length - 1) { curField = FIELDS[idx+1]; curValue = curRow[curField]||''; refreshDisp(); refreshNext(); }
  else commitRow();
}
function commitRow() {
  if (!curRow.item) { showToast('Item number is empty'); return; }
  items.push({ id:nextId++, itemNum:curRow.item, order:parseInt(curRow.order)||0, qoh:parseInt(curRow.qoh)||0 });
  saveDraft(); curRow={item:'',order:'',qoh:''}; curField='item'; curValue='';
  renderEntryItems(); refreshDisp(); refreshNext(); refreshReview();
  showToast('Saved');
}
function deleteEntryItem(idx) {
  if (editIdx === idx) cancelEdit();
  else if (editIdx > idx) editIdx--;
  items.splice(idx, 1);
  saveDraft(); renderEntryItems(); refreshReview();
}

// ── INLINE EDIT (entry screen) ──
function startEdit(idx, field) {
  cancelEdit();
  editIdx = idx; editField = field;
  const item = items[idx]; if (!item) return;
  curValue = field==='item' ? item.itemNum : field==='order' ? String(item.order) : String(item.qoh);
  refreshEditDisp(); renderEntryItems();
}
function saveInlineEdit() {
  if (editIdx < 0) return;
  const item = items[editIdx]; if (!item) { cancelEdit(); return; }
  if (editField==='item')  item.itemNum = curValue || item.itemNum;
  if (editField==='order') item.order   = parseInt(curValue)||0;
  if (editField==='qoh')   item.qoh     = parseInt(curValue)||0;
  saveDraft(); cancelEdit(); renderEntryItems(); refreshReview();
  showToast('Updated');
}
function cancelEdit() {
  editIdx=-1; editField=null; curValue='';
  renderEntryItems(); refreshDisp(); refreshNext();
}
function refreshEditDisp() {
  const lbl = document.getElementById('eLabel');
  const val = document.getElementById('eVal');
  const cur = document.getElementById('eCursor');
  lbl.textContent = 'Editing — ' + LABELS[editField];
  lbl.className   = 'e-field-label edit-lbl';
  cur.className   = 'e-cursor' + (editField==='qoh' ? ' blue-cur' : '');
  if (curValue) { val.className='e-value'; val.innerHTML=curValue; val.appendChild(cur); }
  else { val.className='e-value dim'; val.innerHTML='enter value'; val.appendChild(cur); }
  const nb = document.getElementById('nextBtn');
  nb.textContent='Save'; nb.className='k kblue';
  document.getElementById('eCtx').innerHTML='';
}

// ── ENTRY DISPLAY ──
function refreshDisp() {
  if (editIdx >= 0) { refreshEditDisp(); return; }
  const fi = FIELDS.indexOf(curField);
  FIELDS.forEach((_,i) => {
    const s = document.getElementById('seg'+i);
    s.className = 'step-seg' + (i<=fi?' active':'') + (i<fi?' done':'');
  });
  const lbl = document.getElementById('eLabel');
  const val = document.getElementById('eVal');
  const cur = document.getElementById('eCursor');
  lbl.textContent = LABELS[curField];
  lbl.className   = 'e-field-label' + (curField==='qoh'?' blue-lbl':'');
  cur.className   = 'e-cursor' + (curField==='qoh'?' blue-cur':'');
  if (curValue) { val.className='e-value'; val.innerHTML=curValue; val.appendChild(cur); }
  else { val.className='e-value dim'; val.innerHTML=PROMPTS[curField]; val.appendChild(cur); }
  const ctx = document.getElementById('eCtx');
  if (curField==='item') { ctx.innerHTML=''; return; }
  let h='';
  if (curRow.item) h += `<div class="e-ctx-chip">Item <span class="cv">${curRow.item}</span></div>`;
  if (curField==='qoh' && curRow.order) h += `<div class="e-ctx-chip">Order <span class="ca">${curRow.order}</span></div>`;
  ctx.innerHTML = h;
}
function refreshNext() {
  if (editIdx >= 0) return;
  const btn=document.getElementById('nextBtn'), last=curField==='qoh';
  btn.textContent = last ? 'Add' : 'Next';
  btn.className   = 'k ' + (last ? 'kblue' : 'kaccent');
}
function refreshReview() {
  const cnt = items.filter(i=>i.order>0).length, has = cnt>0;
  const btn = document.getElementById('reviewBtn');
  btn.className   = 'k-review' + (has ? ' on' : '');
  btn.textContent = has ? 'Review Order  (' + cnt + ')' : 'Review Order';
}

// ── RENDER ENTRY ITEMS ──
function renderEntryItems() {
  const inner = document.getElementById('items-inner');
  if (!items.length) { inner.innerHTML='<div class="no-items-msg">No items yet — start entering below</div>'; return; }
  inner.innerHTML = items.map((it,idx) => {
    const ef = (editIdx===idx && editField==='item')  ? ' editing'      : '';
    const eo = (editIdx===idx && editField==='order') ? ' editing'      : '';
    const eq = (editIdx===idx && editField==='qoh')   ? ' editing-blue' : '';
    return `<div class="item-row">
      <div class="item-cell ic-num${ef}"  onclick="startEdit(${idx},'item')">${it.itemNum}</div>
      <div class="item-cell ic-qty${eo}" onclick="startEdit(${idx},'order')">${it.order}</div>
      <div class="item-cell ic-qoh${eq}"  onclick="startEdit(${idx},'qoh')">${it.qoh}</div>
      <button class="del-btn" onclick="deleteEntryItem(${idx})">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }).join('');
}

// ── REVIEW SCREEN ──
function goToReview() {
  const ord = items.filter(i=>i.order>0);
  if (!ord.length) { showToast('No items with an order quantity yet'); return; }
  renderReviewList();
  document.getElementById('rStore').textContent = store;
  document.getElementById('rMeta').textContent  = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('rBadge').textContent = ord.length + ' items';
  goTo('s-review');
}
function renderReviewList() {
  const ord = items.filter(i=>i.order>0);
  document.getElementById('rList').innerHTML = ord.map((it, ri) => {
    // ri = index within ordered items; need to map back to items[] index
    const idx = items.indexOf(it);
    return `<div class="rev-t-row">
      <div class="rev-cell rc-num"   onclick="openOverlay(${idx},'item')">${it.itemNum}</div>
      <div class="rev-cell rc-order" onclick="openOverlay(${idx},'order')">${it.order}</div>
      <div class="rev-cell rc-qoh"   onclick="openOverlay(${idx},'qoh')">${it.qoh}</div>
      <button class="rc-del" onclick="deleteReviewItem(${idx})">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }).join('');
  const cnt = ord.length;
  document.getElementById('rBadge').textContent = cnt + ' item' + (cnt!==1?'s':'');
}
function deleteReviewItem(idx) {
  items.splice(idx, 1);
  saveDraft(); renderReviewList(); renderEntryItems(); refreshReview();
  // If no items left, go back
  if (!items.filter(i=>i.order>0).length) goTo('s-entry');
}

// ── OVERLAY NUMPAD (review screen) ──
function openOverlay(idx, field) {
  overlayIdx = idx; overlayField = field;
  const item = items[idx]; if (!item) return;
  overlayValue = field==='item' ? item.itemNum : field==='order' ? String(item.order) : String(item.qoh);
  // Style
  const lbl = document.getElementById('overlayLabel');
  const saveBtn = document.getElementById('overlaySaveBtn');
  lbl.textContent = LABELS[field];
  lbl.style.color = field==='qoh' ? 'var(--blue)' : 'var(--accent)';
  saveBtn.className = 'k ' + (field==='qoh' ? 'kblue' : 'kaccent');
  // Highlight tapped cell
  document.querySelectorAll('.rev-cell').forEach(c => c.classList.remove('editing','editing-blue'));
  renderReviewList(); // re-render then highlight
  refreshOverlayVal();
  const overlay = document.getElementById('numpadOverlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('numpadSheet').style.transform = 'translateY(0)';
  }));
}
function closeOverlay() {
  const sheet = document.getElementById('numpadSheet');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(() => {
    document.getElementById('numpadOverlay').style.display = 'none';
    overlayIdx=-1; overlayField=null; overlayValue='';
  }, 280);
}
function overlayBgClick(e) { if (e.target === document.getElementById('numpadOverlay')) closeOverlay(); }
function okp(d)    { overlayValue += d; refreshOverlayVal(); }
function okpDel()  { overlayValue = overlayValue.slice(0,-1); refreshOverlayVal(); }
function refreshOverlayVal() {
  const val = document.getElementById('overlayVal');
  const cur = document.getElementById('overlayCursor');
  cur.className = 'e-cursor' + (overlayField==='qoh' ? ' blue-cur' : '');
  if (overlayValue) { val.innerHTML=''; val.textContent=overlayValue; val.appendChild(cur); }
  else { val.innerHTML=''; val.appendChild(cur); }
}
function saveOverlayEdit() {
  if (overlayIdx < 0) return;
  const item = items[overlayIdx]; if (!item) { closeOverlay(); return; }
  if (overlayField==='item')  item.itemNum = overlayValue || item.itemNum;
  if (overlayField==='order') item.order   = parseInt(overlayValue)||0;
  if (overlayField==='qoh')   item.qoh     = parseInt(overlayValue)||0;
  saveDraft();
  closeOverlay();
  setTimeout(() => { renderReviewList(); renderEntryItems(); refreshReview(); }, 290);
  showToast('Updated');
}

// ── HISTORY ──
function renderHist() {
  const hist=loadHist(), sc=document.getElementById('hScroll');
  if (!hist.length) { sc.innerHTML='<div class="empty"><div style="font-size:32px;opacity:0.2">◷</div><p>No past orders yet.<br>Complete an order to see it here.</p></div>'; return; }
  const g={};
  hist.forEach(o=>{if(!g[o.store])g[o.store]=[];g[o.store].push(o);});
  sc.innerHTML=Object.keys(g).map(s=>
    `<div class="h-group">${s}</div>`+
    g[s].map(o=>`<div class="h-card" onclick="viewPast(${o.id})">
      <div><div class="hc-date">${o.date}</div><div class="hc-meta">${o.items.length} items ordered</div></div>
      <div class="hc-right"><span class="hc-cnt">${o.items.length}</span><span class="hc-arr">›</span>
      <button class="hc-del" onclick="event.stopPropagation();delHist(${o.id})">✕</button></div>
    </div>`).join('')
  ).join('');
}
function delHist(id) { if(!confirm('Delete this order?'))return; saveHist(loadHist().filter(o=>o.id!==id)); renderHist(); }
function viewPast(id) {
  pastOrder=loadHist().find(o=>o.id===id); if(!pastOrder)return;
  document.getElementById('pTitle').textContent=pastOrder.store;
  document.getElementById('pStore').textContent=pastOrder.store;
  document.getElementById('pMeta').textContent=pastOrder.date+' · '+pastOrder.items.length+' items';
  document.getElementById('pList').innerHTML=pastOrder.items.map(i=>`
    <div class="t-row"><div class="t-item">${i.itemNum}</div><div class="t-order">${i.order}</div><div class="t-qoh">${i.qoh}</div></div>`).join('');
  goTo('s-past');
}
function copyPast() {
  if(!pastOrder)return;
  copyTxt(JSON.stringify({store:pastOrder.store,date:pastOrder.isoDate,items:pastOrder.items.map(i=>({item:i.itemNum,order:i.order,qoh:i.qoh}))},null,2),'Copied to clipboard');
}
function dlPastCSV() {
  if(!pastOrder)return;
  let csv='Store,Date,Item #,Order Qty,On Hand\n';
  pastOrder.items.forEach(i=>{csv+=`"${pastOrder.store}","${pastOrder.isoDate}","${i.itemNum}",${i.order},${i.qoh}\n`;});
  doDownload(csv,`${pastOrder.store.replace(/ /g,'_')}_${pastOrder.isoDate}.csv`);
}

// ── FINALISE ──
function finalise() {
  archiveOrder(); clearDraft();
  const p={store,date:new Date().toLocaleDateString('en-CA'),items:items.filter(i=>i.order>0).map(i=>({item:i.itemNum,order:i.order,qoh:i.qoh}))};
  copyTxt(JSON.stringify(p,null,2),'Order saved and copied');
  items=[]; nextId=1; goTo('s-store');
}
function dlCSV() {
  const date=new Date().toLocaleDateString('en-CA');
  let csv='Store,Date,Item #,Order Qty,On Hand\n';
  items.filter(i=>i.order>0).forEach(i=>{csv+=`"${store}","${date}","${i.itemNum}",${i.order},${i.qoh}\n`;});
  doDownload(csv,`${store.replace(/ /g,'_')}_${date}.csv`);
  showToast('Spreadsheet saved');
}

// ── UTILS ──
function copyTxt(text,msg) {
  (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject())
    .then(()=>showToast(msg))
    .catch(()=>{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast(msg);});
}
function doDownload(csv,name) { const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click(); }
let _tt;
function showToast(msg) { const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2000); }

// ── INIT ──
refreshDisp(); refreshNext(); refreshReview();
</script>
</body>
</html>
